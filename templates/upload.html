

{% extends "base.html" %}

{% block content %}
<h1>Upload Quiz</h1>

<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    <div class="mb-3">
        {{ form.csv_file }}
    </div>
    <button class="btn btn-dark" type="submit">Upload</button>
</form>
<br>
<a class="btn btn-dark" href="{% url 'dashboard' %}">Back to Dashboard</a>
{% endblock %}
