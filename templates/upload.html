

{% extends "base.html" %}

{% block content %}
<h1>Upload Quiz</h1>

<form method="post" enctype="multipart/form-data">

    <div class="mb-3">
        {{ form.csv_file }}
    </div>
    <button class="btn btn-success" type="submit">Upload</button>
</form>

<a href="/dashboard/">Back to Dashboard</a>
{% endblock %}
