{% extends "base.html" %}

{% block content %}

    <div class="container mt-4">

        <div class="row justify-content-center">

            <div class="col-lg-8">

                <div class="card shadow-sm">

                    <div class="card-body p-4">

                        <h1 class="mb-3">
                            Create Flash Card Set
                        </h1>

                        <p class="text-muted mb-4">
                            Create a new flash card set and then upload a CSV file containing your cards.
                        </p>

                        <div class="mb-4">

                            <a class="btn btn-outline-secondary"
                               href="{% url 'download_flashcard_csv_template' %}">

                                Download CSV Template

                            </a>

                        </div>

                        <form method="POST">

                            {% csrf_token %}

                            <div class="mb-3">

                                <label class="form-label">
                                    Title
                                </label>

                                {{ form.title }}

                            </div>

                            <div class="mb-4">

                                <label class="form-label">
                                    Description
                                </label>

                                {{ form.description }}

                            </div>

                            <div class="d-flex justify-content-between">

                                <a href="{% url 'dashboard' %}"
                                   class="btn btn-outline-secondary">
                                    Cancel
                                </a>

                                <button type="submit"
                                        class="btn btn-dark">
                                    Continue to Upload Step
                                </button>

                            </div>

                        </form>

                    </div>

                </div>

            </div>

        </div>

    </div>

{% endblock %}
